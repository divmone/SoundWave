name: Deploy

on:
  push:
    branches: [main]
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy new version
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave || exit 1
            git pull origin main
            docker compose down
            docker compose up --build -d
            docker image prune -f

      - name: Wait for services to be ready
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave || exit 1
            
            for i in {1..30}; do
              RUNNING_SERVICES=$(docker compose ps --filter "status=running" --format "{{.Service}}" | wc -l)
              TOTAL_SERVICES=$(docker compose config --services | wc -l)
            
              if [ "$RUNNING_SERVICES" -ge "$TOTAL_SERVICES" ] && [ "$TOTAL_SERVICES" -gt 0 ]; then
                echo "✅ All services are running!"
                docker compose ps
                exit 0
              fi
            
              echo "Attempt $i/30: waiting for containers... ($RUNNING_SERVICES/$TOTAL_SERVICES running)"
              sleep 10
            done
            
            echo "❌ Services failed to become ready"
            docker compose logs --tail=50
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave || exit 1
            echo "Rolling back to previous version..."
            docker compose down
            docker compose up --build -d
            echo "Rollback completed"
            docker compose logs --tail=20