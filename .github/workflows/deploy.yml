name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get previous commit hash
        run: |
          if [ "$(git rev-list --count HEAD~1 2>/dev/null)" -gt 0 ]; then
            echo "PREV_COMMIT=$(git rev-parse HEAD~1)" >> $GITHUB_ENV
          else
            echo "PREV_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          fi

      - name: Deploy new version
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave
            git fetch origin
            git reset --hard origin/main
            
            cat > .env << EOF
            JWT_CHECK_ENABLED=false
            EOF
            
            docker compose down
            docker compose up --build -d
            docker image prune -f

      - name: Wait for services to be ready
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave
            echo "Waiting for services to be ready..."
            
            for i in {1..30}; do
              if [ "$(docker compose ps -q | wc -l)" -gt 0 ] && docker compose ps | grep -q "Up"; then
                RUNNING_SERVICES=$(docker compose ps --filter "status=running" --format "{{.Service}}" | wc -l)
                TOTAL_SERVICES=$(docker compose config --services | wc -l)
            
                if [ "$RUNNING_SERVICES" -ge "$TOTAL_SERVICES" ]; then
                  echo "✅ All services are running!"
                  docker compose ps
                  exit 0
                fi
              fi
              echo "Attempt $i/30: waiting for containers... ($RUNNING_SERVICES/$TOTAL_SERVICES running)"
              sleep 10
            done
            
            echo "❌ Services failed to become ready"
            docker compose logs --tail=50
            exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install bruno-cli
        run: npm install -g @usebruno/cli

      - name: Run Bruno tests
        working-directory: tests
        run: |
          mkdir -p ../reports
          npx @usebruno/cli run . --output ../reports/junit.xml --format junit
          echo "Tests completed"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bruno-test-results
          path: reports/

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave
            echo "Rolling back to previous version: ${{ env.PREV_COMMIT }}"
            git reset --hard ${{ env.PREV_COMMIT }}
            docker compose down
            docker compose up --build -d
            echo "Rollback completed"
            docker compose logs --tail=20