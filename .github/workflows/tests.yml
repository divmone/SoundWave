name: Tests

on:
  push:
    branches:
      - '*'          # Все ветки
      - '!main'      # Кроме main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ============================================
      # 1. ДЕПЛОЙ НА ТЕСТОВЫЙ СЕРВЕР
      # ============================================
      - name: Deploy to test server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /root/SoundWave || exit 1
            
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "🚀 Deploying branch: $BRANCH"
            
            # Fetch and checkout the specific branch
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH
            
            # Show current commit
            echo "📦 Deploying commit: $(git rev-parse --short HEAD)"
            
            # Stop old containers
            docker compose -f docker-compose.yml -f docker-compose.override.yml down
            
            # Build and start new ones (with debug override for testing)
            docker compose -f docker-compose.yml -f docker-compose.override.yml --env-file .env.test up --build -d
            
            # Clean up old images
            docker image prune -f
            
            echo "✅ Deployment completed!"

      # ============================================
      # 2. API ТЕСТЫ (python - заглушка)
      # ============================================
      - name: Run API tests (python)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave || exit 1

            echo "⏳ Waiting for services to start..."

            for i in {1..10}; do
              RUNNING_SERVICES=$(docker compose -f docker-compose.yml -f docker-compose.override.yml ps --filter "status=running" --format "{{.Service}}" | grep -v "migrate" | wc -l)
              TOTAL_SERVICES=$(docker compose -f docker-compose.yml -f docker-compose.override.yml config --services | grep -v "migrate" | wc -l)

              if [ "$RUNNING_SERVICES" -ge "$TOTAL_SERVICES" ] && [ "$TOTAL_SERVICES" -gt 0 ]; then
                echo ""
                echo "✅ All services are running! ($RUNNING_SERVICES/$TOTAL_SERVICES)"
                echo ""

                cd tests || exit 1
                python3 tests.py
            
                echo "Tests passed!"
                exit 0
              fi

              echo "⏳ Waiting... ($RUNNING_SERVICES/$TOTAL_SERVICES running)"
              sleep 5
            done

            echo ""
            echo "❌ Services failed to become ready"
            echo ""
            echo "📋 Last logs:"
            docker compose -f docker-compose.yml -f docker-compose.override.yml logs --tail=50
            exit 1