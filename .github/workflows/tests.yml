name: Tests

on:
  push:
    branches:
      - '*'          # Все ветки
      - '!main'      # Кроме main
# ДА, я оставлю смайлики от ИИ, они хорошо цветом выделяются в полотне белого текста, что удобно
jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ============================================
      # 1. ДЕПЛОЙ НА ТЕСТОВЫЙ СЕРВЕР
      # ============================================
      - name: Deploy to test server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /root/SoundWave || exit 1
            
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "🚀 Deploying branch: $BRANCH"
            
            # Fetch and checkout the specific branch
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH
            
            # Show current commit
            echo "📦 Deploying commit: $(git rev-parse --short HEAD)"
            
            # Stop old containers
            docker compose down
            
            # Build and start new ones
            docker compose --env-file .env.test up  --build -d
            
            # Clean up old images
            docker image prune -f
            
            echo "✅ Deployment completed!"

      # ============================================
      # 2. API ТЕСТЫ (Bruno - заглушка)
      # ============================================
      - name: Run API tests (Bruno)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave || exit 1

            echo "⏳ Waiting for services to start..."

            for i in {1..30}; do
              RUNNING_SERVICES=$(docker compose ps --filter "status=running" --format "{{.Service}}" | wc -l)
              TOTAL_SERVICES=$(docker compose config --services | wc -l)

              if [ "$RUNNING_SERVICES" -ge "$TOTAL_SERVICES" ] && [ "$TOTAL_SERVICES" -gt 0 ]; then
                echo ""
                echo "✅ All services are running! ($RUNNING_SERVICES/$TOTAL_SERVICES)"
                echo ""
                docker compose ps
                exit 0
              fi

              echo "   Attempt $i/30: waiting... ($RUNNING_SERVICES/$TOTAL_SERVICES running)"
              sleep 10
            done

            echo ""
            echo "❌ Services failed to become ready"
            echo ""
            echo "📋 Last logs:"
            docker compose logs --tail=50
            exit 1

            # ============================================

      # ============================================
      # 3. ROLLBACK ON FAILURE
      # ============================================
      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            cd /root/SoundWave || exit 1
            
            echo ""
            echo "🔄 ROLLBACK INITIATED"
            echo "========================================"
            
            # Get previous commit
            git reset --hard HEAD~1
            
            echo "📦 Rolling back to: $(git rev-parse --short HEAD)"
            
            # Restart with previous version
            docker compose down
            docker compose up --env-file .env.test --build -d
            
            echo "✅ Rollback completed!"
            echo ""
            echo "📋 Last logs:"
            docker compose logs --tail=20