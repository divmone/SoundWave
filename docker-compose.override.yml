services:

# ========== AUTH SERVICE ==========
  auth-service:
    build:
      context: ./backend/authService
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: Debug
    environment:
      - BUILD_TYPE=Debug
    stdin_open: true
    tty: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

  # ========== SOUNDS SERVICE ==========
  sounds-service:
    build:
      context: ./backend/soundsStorageService
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: Debug
    ports:
      - "12345:12345"  # gdbserver
    environment:
      - BUILD_TYPE=Debug
      - LOG_LEVEL=debug
      - ENVIRONMENT=development
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    cap_add:
      - SYS_PTRACE
    volumes:
      - sounds_data:/data/sounds
      - ./backend/soundsStorageService/config:/app/config:ro
      - ./backend/soundsStorageService:/app/src:ro

  # ========== PAYMENT SERVICE ==========
  payment-service:
    build:
      context: backend/paymentService
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: Debug
    environment:
      - BUILD_TYPE=Debug
    stdin_open: true
    tty: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

  # ========== COMMENT SERVICE ==========
  comment-service:
    build:
      context: ./backend/commentService
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: Debug
    environment:
      - BUILD_TYPE=Debug
    stdin_open: true
    tty: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

