info:
  name: /sounds/amount
  type: http
  seq: 1

http:
  method: GET
  url: https://localhost/api/v1.0/sounds/amount
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Статус 200", function() {
            expect(res.status).to.equal(200);
        });

        test("Есть поле amount", function() {
            expect(res.body).to.have.property("amount");
        });

        test("amount — число", function() {
            expect(res.body.amount).to.be.a("number");
        });

        test("amount >= 0", function() {
            expect(res.body.amount).to.be.at.least(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
