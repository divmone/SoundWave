info:
  name: " Sound Data"
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost/api/v1.0/sounds/1/upload
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Статус 200", function() {
            expect(res.status).to.equal(200);
        });

        test("Content-Type — audio/*", function() {
            expect(res.headers["content-type"]).to.match(/^audio\//);
        });

        test("Тело не пустое", function() {
            expect(res.body).to.not.be.empty;
        });

        test("Размер > 0 байт", function() {
            expect(res.body.length).to.be.greaterThan(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
