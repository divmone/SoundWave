version: '3.8'

services:
  auth-postgres:
    image: postgres:15
    container_name: auth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: soundwaveUsers
    # ports убраны — БД доступна только внутри Docker-сети
    expose:
      - "5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
      - ./backend/authService/postgresql/schemas/db_1.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/authService/postgresql/data/initial_data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d soundwaveUsers"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-postgres:
    image: postgres:15
    container_name: sounds-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: soundwaveSounds
    # ports убраны — БД доступна только внутри Docker-сети
    expose:
      - "5432"
    volumes:
      - sounds_postgres_data:/var/lib/postgresql/data
      - ./backend/soundsStorageService/database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d soundwaveSounds"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soundwave-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/authService
      dockerfile: Dockerfile
    container_name: soundwave-auth
    # Только localhost — nginx обращается через Docker-сеть, не через хост
    expose:
      - "8080"
    environment:
      - DB_HOST=auth-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=soundwaveUsers
      - DB_CONNECTION=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-postgres:5432/soundwaveUsers
      - CPU_LIMIT=4c
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-storage:
    build:
      context: ./backend/soundsStorageService
      dockerfile: Dockerfile
    container_name: soundwave-storage
    # Только localhost — nginx обращается через Docker-сеть, не через хост
    expose:
      - "8080"
    environment:
      - DB_HOST=sounds-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=soundwaveSounds
      - SERVER_PORT=8080
      - STORAGE_PATH=/data/sounds
    volumes:
      - sounds_data:/data/sounds
      - ./backend/soundsStorageService/config:/app/config:ro
    depends_on:
      sounds-postgres:
        condition: service_healthy
    networks:
      - soundwave-network
    restart: unless-stopped

  frontend:
    build:
      context: ./front-end/soundwave
      dockerfile: Dockerfile
    container_name: soundwave-frontend-builder
    volumes:
      - frontend_dist:/frontend-dist
    networks:
      - soundwave-network
    restart: unless-stopped

  # Nginx — единственная точка входа
  nginx:
    image: nginx:alpine
    container_name: soundwave-nginx
    ports:
      - "80:80"      # единственный открытый порт
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./front-end/soundwave/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - sounds-storage
    networks:
      - soundwave-network
    restart: unless-stopped
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: StrongPassword
    ports:
      - "5050:80"  # <-- раскомментировать или добавить
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - soundwave-network
    restart: unless-stopped

volumes:
  auth_postgres_data:
  sounds_postgres_data:
  sounds_data:
  frontend_dist:
  pgadmin_data:

networks:
  soundwave-network:
    driver: bridge
