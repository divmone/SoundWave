services:
  frontend:
    build:
      context: ./front-end/soundwave
      dockerfile: Dockerfile
    container_name: soundwave-frontend
    volumes:
      - frontend_dist:/frontend-dist
    networks:
      - soundwave-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: soundwave-nginx
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./front-end/soundwave/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - sounds-storage
    networks:
      - soundwave-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/authService
      dockerfile: Dockerfile
    container_name: soundwave-auth
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${POSTGRES_DB:-soundwaveUsers}
      - DB_CONNECTION=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-soundwaveUsers}
      - CPU_LIMIT=4c
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-storage:
    build:
      context: ./backend/soundsStorageService
      dockerfile: Dockerfile
    container_name: soundwave-storage
    expose:
      - "8080"
    environment:
      - DB_HOST=sounds-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=soundwaveSounds
      - SERVER_PORT=8080
      - STORAGE_PATH=/data/sounds
    volumes:
      - sounds_data:/data/sounds
      - ./backend/soundsStorageService/config:/app/config
    depends_on:
      sounds-postgres:
        condition: service_healthy
    networks:
      - soundwave-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: soundwave-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-soundwaveUsers}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/authService/postgresql/schemas/db_1.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/authService/postgresql/data/initial_data.sql:/docker-entrypoint-initdb.d/02_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-soundwaveUsers}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-postgres:
    image: postgres:15
    container_name: soundwave-sounds-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - sounds_postgres_data:/var/lib/postgresql/data
      - ./backend/soundsStorageService/database/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soundwave-network
    restart: unless-stopped

volumes:
  postgres_data:
  sounds_postgres_data:
  sounds_data:
  frontend_dist:

networks:
  soundwave-network:
    driver: bridge