services:
  auth-postgres:
    image: postgres:15
    container_name: auth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: soundwaveUsers
    expose:
      - "5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d soundwaveUsers"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-postgres:
    image: postgres:15
    container_name: sounds-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: soundwaveSounds
    expose:
      - "5432"
    #ports:
    #  - "5433:5432"
    volumes:
      - sounds_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d soundwaveSounds"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soundwave-network
    restart: unless-stopped
  
  migrate-auth:
    image: liquibase/liquibase:4.27
    command: >
      --url=jdbc:postgresql://auth-postgres:5432/soundwaveUsers
      --username=${POSTGRES_USER:-postgres}
      --password=${POSTGRES_PASSWORD:-postgres}
      --changelog-file=db.changelog-master.xml
      --search-path=/liquibase/changelog
      update
    volumes:
      - ./migrations/authService:/liquibase/changelog
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - soundwave-network
  
  migrate-sounds:
    image: liquibase/liquibase:4.27
    command: >
      --url=jdbc:postgresql://sounds-postgres:5432/soundwaveSounds
      --username=${POSTGRES_USER:-postgres}
      --password=${POSTGRES_PASSWORD:-postgres}
      --changelog-file=db.changelog-master.xml
      --search-path=/liquibase/changelog
      update
    volumes:
      - ./migrations/soundsStorageService:/liquibase/changelog
    depends_on:
      sounds-postgres:
        condition: service_healthy
    networks:
      - soundwave-network

  auth-service:
    build:
      context: ./backend/authService
      dockerfile: Dockerfile
    container_name: soundwave-auth
    expose:
      - "8080"
    environment:
      - DB_HOST=auth-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=soundwaveUsers
      - DB_CONNECTION=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-postgres:5432/soundwaveUsers
      - CPU_LIMIT=4c
    depends_on:
      auth-postgres:
        condition: service_healthy
      migrate-auth:
        condition: service_completed_successfully
    dns:
    - 8.8.8.8
    - 8.8.4.4
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-storage:
    build:
      context: ./backend/soundsStorageService
      dockerfile: Dockerfile
    container_name: soundwave-storage
    expose:
      - "8080"
    environment:
      - DB_HOST=sounds-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=soundwaveSounds
      - SERVER_PORT=8080
      - STORAGE_PATH=/data/sounds
      - JWT_CHECK_ENABLED=${JWT_CHECK_ENABLED:-false}
    volumes:
      - sounds_data:/data/sounds
      - ./backend/soundsStorageService/config:/app/config:ro
    depends_on:
      sounds-postgres:
        condition: service_healthy
      migrate-sounds:
        condition: service_completed_successfully
    networks:
      - soundwave-network
    restart: unless-stopped

  frontend:
    build:
      context: ./front-end/soundwave
      dockerfile: Dockerfile
    container_name: soundwave-frontend-builder
    volumes:
      - frontend_dist:/frontend-dist
    networks:
      - soundwave-network
    restart: unless-stopped

  # Nginx — единственная точка входа
  nginx:
    image: nginx:alpine
    container_name: soundwave-nginx
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./front-end/soundwave/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - sounds-storage
    networks:
      - soundwave-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: StrongPassword
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - soundwave-network
    restart: unless-stopped

volumes:
  auth_postgres_data:
  sounds_postgres_data:
  sounds_data:
  frontend_dist:
  pgadmin_data:

networks:
  soundwave-network:
    driver: bridge
