services:
  auth-postgres:
    image: postgres:15
    expose:
      - "5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
      - ./backend/authService/postgresql/schemas/db_1.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/authService/postgresql/data/initial_data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-postgres:
    image: postgres:15
    expose:
      - "5432"
    volumes:
      - sounds_postgres_data:/var/lib/postgresql/data
      - ./backend/soundsStorageService/database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${SOUNDS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soundwave-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/authService
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=auth-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${AUTH_DB_NAME:-soundwaveUsers}
      - DB_CONNECTION=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-postgres:5432/${AUTH_DB_NAME:-soundwaveUsers}
      - CPU_LIMIT=${AUTH_CPU_LIMIT:-4c}
      - LOG_LEVEL=${AUTH_LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-prod}
    depends_on:
      auth-postgres:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - soundwave-network
    restart: unless-stopped

  sounds-service:
    build:
      context: ./backend/soundsStorageService
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=sounds-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${SOUNDS_DB_NAME:-soundwaveSounds}
      - SERVER_PORT=8080
      - STORAGE_PATH=${STORAGE_PATH:-/data/sounds}
      - LOG_LEVEL=${SOUNDS_LOG_LEVEL:-info}
      - OAUTH_TOKEN_CHECK_ENABLED=${OAUTH_TOKEN_CHECK_ENABLED:-false}
    volumes:
      - sounds_data:/data/sounds
      - ./backend/soundsStorageService/config:/app/config:ro
    depends_on:
      sounds-postgres:
        condition: service_healthy
    networks:
      - soundwave-network
    restart: unless-stopped

  frontend:
    build:
      context: ./front-end/soundwave
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/frontend-dist
    networks:
      - soundwave-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - frontend_dist:/usr/share/share/nginx/html:ro
      - ./front-end/soundwave/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - sounds-service
    networks:
      - soundwave-network
    restart: unless-stopped

volumes:
  auth_postgres_data:
  sounds_postgres_data:
  sounds_data:
  frontend_dist:

networks:
  soundwave-network:
    driver: bridge