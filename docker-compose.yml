services:

  ######################################################

  auth-postgres:
    image: postgres:15
    container_name: soundwave-auth-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${AUTH_DB_NAME:-soundwaveUsers}
    expose:
      - "5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${AUTH_DB_NAME:-soundwaveUsers}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  sounds-postgres:
    image: postgres:15
    container_name: soundwave-sounds-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${SOUNDS_DB_NAME:-soundwaveSounds}
    expose:
      - "5432"
    volumes:
      - sounds_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${SOUNDS_DB_NAME:-soundwaveSounds}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  payment-postgres:
    image: postgres:15
    container_name: soundwave-payment-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${PAYMENT_DB_NAME:-soundwavePayment}
    expose:
      - "5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${PAYMENT_DB_NAME:-soundwavePayment}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  migrate-auth:
    image: liquibase/liquibase:4.27
    command: >
      --url=jdbc:postgresql://auth-postgres:5432/soundwaveUsers
      --username=${POSTGRES_USER:-postgres}
      --password=${POSTGRES_PASSWORD:-postgres}
      --changelog-file=db.changelog-master.xml
      --search-path=/liquibase/changelog
      update
    volumes:
      - ./migrations/authService:/liquibase/changelog
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - soundwave-network

  ######################################################

  migrate-sounds:
    image: liquibase/liquibase:4.27
    command: >
      --url=jdbc:postgresql://sounds-postgres:5432/soundwaveSounds
      --username=${POSTGRES_USER:-postgres}
      --password=${POSTGRES_PASSWORD:-postgres}
      --changelog-file=db.changelog-master.xml
      --search-path=/liquibase/changelog
      update
    volumes:
      - ./migrations/soundsStorageService:/liquibase/changelog
    depends_on:
      sounds-postgres:
        condition: service_healthy
    networks:
      - soundwave-network

  ######################################################

  migrate-payment:
    image: liquibase/liquibase:4.27
    command: >
      --url=jdbc:postgresql://payment-postgres:5432/soundwavePayment
      --username=${POSTGRES_USER:-postgres}
      --password=${POSTGRES_PASSWORD:-postgres}
      --changelog-file=db.changelog-master.xml
      --search-path=/liquibase/changelog
      update
    volumes:
      - ./migrations/paymentService:/liquibase/changelog
    depends_on:
      payment-postgres:
        condition: service_healthy
    networks:
      - soundwave-network

  ######################################################

  auth-service:
    build:
      context: ./backend/authService
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=auth-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${AUTH_DB_NAME:-soundwaveUsers}
      - DB_CONNECTION=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-postgres:5432/${AUTH_DB_NAME:-soundwaveUsers}
      - CPU_LIMIT=${AUTH_CPU_LIMIT:-4c}
      - LOG_LEVEL=${AUTH_LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      auth-postgres:
        condition: service_healthy
      migrate-auth:
        condition: service_completed_successfully
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################



  ######################################################

  sounds-service:
    build:
      context: ./backend/soundsStorageService
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - DB_HOST=sounds-postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${SOUNDS_DB_NAME:-soundwaveSounds}
      - SERVER_PORT=8080
      - STORAGE_PATH=${STORAGE_PATH:-/data/sounds}
      - LOG_LEVEL=${SOUNDS_LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - OAUTH_TOKEN_CHECK_ENABLED=${OAUTH_TOKEN_CHECK_ENABLED:-false}
    volumes:
      - sounds_data:/data/sounds
      - ./backend/soundsStorageService/config:/app/config:ro
    depends_on:
      sounds-postgres:
        condition: service_healthy
      migrate-sounds:
        condition: service_completed_successfully
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  comment-service:
    build:
      context: ./backend/commentService
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - CPU_LIMIT=${AUTH_CPU_LIMIT:-4c}
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@mongodb:27017/soundwave?authSource=admin
    depends_on:
      - mongodb
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  mail-service:
    build:
      context: ./backend/mailService
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CPU_LIMIT=${AUTH_CPU_LIMIT:-4c}
      - LOG_LEVEL=${AUTH_LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-prod}

    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  mongodb:
    image: mongo:7
    container_name: soundwave-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: soundwave
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  frontend:
    build:
      context: ./front-end/soundwave
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/frontend-dist
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./front-end/soundwave/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - sounds-service
      - mail-service
    networks:
      - soundwave-network
    restart: unless-stopped

  ######################################################

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: StrongPassword
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - soundwave-network
    restart: unless-stopped

  mongo-init:
    image: mongo:7
    command: >
      mongosh --host mongodb
      --username ${MONGO_USER:-admin}
      --password ${MONGO_PASSWORD:-admin}
      --authenticationDatabase admin
      soundwave
      --eval 'db.comments.createIndex({"productId": 1, "createdAt": -1})'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - soundwave-network
    restart: on-failure

  ######################################################

volumes:
  auth_postgres_data:
  sounds_postgres_data:
  payment_postgres_data:
  sounds_data:
  frontend_dist:
  pgadmin_data:
  mongo_data:

networks:
  soundwave-network:
    driver: bridge

