server {
    listen 80;
    server_name soundwave.divmone.ru;

    client_max_body_size 100M;

    # Docker внутренний DNS — резолвит имена контейнеров при запросе, а не при старте
    resolver 127.0.0.11 valid=30s;
    set $backend       http://backend:8080;
    set $sounds_service http://sounds-service:6666;

    root /usr/share/nginx/html;
    index index.html;

    # Проксируем только API запросы на бекенд
    location = /auth/google {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /auth/logout {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Sounds API → sounds-service
    location /api/ {
        proxy_pass         $sounds_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        client_max_body_size 100M;
    }

    # React SPA — все остальные пути (включая /auth/callback) отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
