version: '3.8'

services:
  sounds-storage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soundwave-storage
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=soundwaveSounds
      - SERVER_PORT=8080
      - STORAGE_PATH=/data/sounds
      
    volumes:
      - sounds_data:/data/sounds
      - ./config:/app/config:ro
    restart: unless-stopped

volumes:
  sounds_data:

networks:
  soundwave-network:
    driver: bridge