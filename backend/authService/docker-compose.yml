services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_CONNECTION=postgresql://myuser:mypassword@postgres:5432/mydb
      - CPU_LIMIT=4c
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/schemas/db_1.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./postgresql/data/initial_data.sql:/docker-entrypoint-initdb.d/02_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
